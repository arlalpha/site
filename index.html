<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading...</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f5f5f5;
      }

      .hero {
        padding: 80px 20px;
        text-align: center;
        color: white;
      }

      .container {
        max-width: 1000px;
        margin: auto;
        padding: 30px 20px;
      }

      .services {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
      }

      .card {
        background: white;
        padding: 20px;
        border-radius: 12px;
      }

      footer {
        text-align: center;
        padding: 30px;
      }
    </style>
  </head>
  <body>
    <section class="hero" id="hero">
      <h1 id="siteTitle"></h1>
      <p id="siteDescription"></p>
    </section>

    <div class="container">
      <h2>Services</h2>

      <div class="services" id="services"></div>
    </div>

    <footer id="footer"></footer>

    <script>
      async function loadSite() {
        const res = await fetch("site.json");
        const site = await res.json();

        document.title = site.title;

        document.getElementById("siteTitle").textContent = site.title;
        document.getElementById("siteDescription").textContent =
          site.description;

        document.getElementById("hero").style.background =
          site.theme.primaryColor;

        const services = document.getElementById("services");

        site.services.forEach((service) => {
          services.innerHTML += `
                    <div class="card">
                        <h3>${service.name}</h3>
                        <p>${service.description}</p>
                        <strong>${service.price}</strong>
                    </div>
                `;
        });

        document.getElementById("footer").innerHTML =
          `${site.contact.phone} • ${site.contact.email}`;
      }

      loadSite();
    </script>
  </body>
</html>
